<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results - Quizora</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/api.js"></script>
</head>
<body>
    <nav>
        <div class="logo">Quizora<span>.</span></div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
        </div>
    </nav>

    <div class="glass-container" style="max-width: 600px; margin-top: 5rem; text-align: center;">
        <h2>Quiz Completed!</h2>
        <p style="margin-bottom: 2rem;">Here is your performance summary.</p>
        
        <div class="stat-grid" style="grid-template-columns: repeat(2, 1fr); margin-bottom: 2rem;">
            <div class="stat-item">
                <div class="stat-value" id="score">0</div>
                <div>Questions Correct</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="time">0s</div>
                <div>Time Taken</div>
            </div>
        </div>

        <h3>Question Breakdown</h3>
        <div id="breakdown" style="text-align: left; margin-top: 1rem; max-height: 300px; overflow-y: auto; padding-right: 0.5rem;">
            <!-- Breakdown list -->
        </div>

        <button onclick="window.location.href='dashboard.html'" style="margin-top: 2rem;">Back to Dashboard</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const attemptId = urlParams.get('attempt_id');

        document.addEventListener("DOMContentLoaded", async () => {
            if (!attemptId) { window.location.href = "dashboard.html"; return; }
            await loadResults();
        });

        async function loadResults() {
            try {
                const data = await apiFetch(`/quizzes/attempts/${attemptId}`);
                document.getElementById("score").innerText = data.score;
                document.getElementById("time").innerText = `${data.time_taken}s`;

                const breakdown = document.getElementById("breakdown");
                breakdown.innerHTML = data.answers.map(ans => `
                    <div style="background: rgba(255,255,255,0.02); padding: 0.75rem; border-radius: 8px; margin-bottom: 0.5rem; border-left: 4px solid ${ans.is_correct ? 'var(--accent)' : '#ef4444'};">
                        <p style="color:white; font-size:0.9rem;">${ans.question_text}</p>
                        <p style="font-size:0.8rem;">Selected Option: ${ans.selected_option}</p>
                    </div>
                `).join("");

            } catch (err) { alert(err.message); }
        }
    </script>
</body>
</html>
