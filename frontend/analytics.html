<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Analytics - Quizora</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <div class="logo">Quizora<span>.</span></div>
        <div class="nav-links">
            <a href="dashboard">Dashboard</a>
        </div>
    </nav>

    <div class="dashboard-grid" style="max-width: 1000px; padding: 2rem;">
        <div>
            <h2>Quiz Performance Summary</h2>
            <div class="stat-grid" id="summaryStats">
                <!-- Summary Stats -->
            </div>

            <div class="glass-card" style="margin-top: 2rem; padding: 1rem;">
                <h4>Score Distribution (Leaderboard)</h4>
                <canvas id="scoreChart" style="max-height: 250px;"></canvas>
            </div>

            <h2 style="margin-top: 2rem;">Leaderboard (Top 10)</h2>
            <div class="glass-card" style="padding: 1rem;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 1px solid var(--glass-border); color: var(--text-muted); font-size: 0.85rem;">
                            <th style="padding: 0.5rem;">Student</th>
                            <th>Score</th>
                            <th>Time</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div>
            <h2>Toughest Questions</h2>
            <p style="margin-bottom: 1rem;">Questions with the lowest correct rate.</p>
            <div id="toughQuestions" style="display: flex; flex-direction: column; gap: 1rem;">
                <!-- Tough questions injected here -->
            </div>
        </div>
    </div>

    <!-- Student Profile Modal Overlay -->
    <div id="studentModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px);">
        <div class="glass-container" style="max-width: 500px; width: 90%; padding: 2rem; position: relative; max-height: 80vh; overflow-y: auto;">
            <span onclick="closeModal()" style="position: absolute; top: 1rem; right: 1.25rem; cursor: pointer; font-size: 1.5rem; color: var(--text-muted); transition: color 0.2s;">&times;</span>
            
            <h3 id="modalTitle" style="margin-bottom: 1rem; font-size: 1.35rem;">Student Profile</h3>
            
            <div class="stat-grid" id="modalStats" style="margin-bottom: 1.5rem;"></div>

            <h4>Past Quiz Activity</h4>
            <div style="max-height: 250px; overflow-y: auto; background: rgba(30, 41, 59, 0.4); border-radius: 8px; border: 1px solid var(--glass-border); margin-top: 0.5rem;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-muted); font-size: 0.8rem;">
                            <th style="padding: 0.6rem;">Quiz</th>
                            <th>Score</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="modalHistoryBody" style="font-size: 0.85rem; color: white;"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const quizId = urlParams.get('id');

        document.addEventListener("DOMContentLoaded", async () => {
            if (!quizId) { window.location.href = "dashboard"; return; }
            await loadAnalytics();
        });

        async function loadAnalytics() {
            try {
                // 1. Summary
                const summary = await apiFetch(`/analytics/summary/${quizId}`);
                document.getElementById("summaryStats").innerHTML = `
                    <div class="stat-item"><div class="stat-value">${summary.total_attempts}</div><div>Attempts</div></div>
                    <div class="stat-item"><div class="stat-value">${summary.avg_score.toFixed(1)}</div><div>Avg Score</div></div>
                    <div class="stat-item"><div class="stat-value">${summary.max_score}</div><div>High Score</div></div>
                `;

                // 2. Leaderboard
                const leaderboard = await apiFetch(`/analytics/leaderboard/${quizId}`);
                const lbBody = document.getElementById("leaderboardBody");
                lbBody.innerHTML = leaderboard.map(student => `
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <td style="padding: 0.75rem;">
                            <a href="#" onclick="viewStudentProfile(${student.student_id}, '${student.name}')" style="color: var(--primary); text-decoration: none; font-weight: 600;">${student.name}</a>
                        </td>
                        <td>${student.score}</td>
                        <td>${student.time_taken}s</td>
                        <td style="font-size:0.8rem; color:var(--text-muted);">${new Date(student.date).toLocaleDateString()}</td>
                    </tr>
                `).join("");
                
                // Render Chart
                if (leaderboard.length > 0) {
                    const ctx = document.getElementById('scoreChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: leaderboard.map(s => s.name),
                            datasets: [{
                                label: 'Score',
                                data: leaderboard.map(s => s.score),
                                backgroundColor: 'rgba(56, 189, 248, 0.5)',
                                borderColor: 'rgba(56, 189, 248, 1)',
                                borderWidth: 1,
                                borderRadius: 5
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#9ca3af' } },
                                x: { grid: { display: false }, ticks: { color: '#9ca3af' } }
                            },
                            plugins: { legend: { display: false } }
                        }
                    });
                }

                // 3. Difficult Questions
                const questions = await apiFetch(`/analytics/difficult_questions/${quizId}`);
                const toughDiv = document.getElementById("toughQuestions");
                toughDiv.innerHTML = questions.map(q => `
                    <div class="glass-card" style="padding: 1rem;">
                        <p style="color:white; font-size:0.9rem; font-weight:600;">${q.question_text}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; font-size: 0.8rem;">
                            <span style="color: #ef4444;">Success Rate: ${(q.correct_rate * 100).toFixed(0)}%</span>
                            <span style="color: var(--text-muted);">${q.correct_count} / ${q.total_answers} Correct</span>
                        </div>
                    </div>
                `).join("");

            } catch (err) { alert(err.message); }
        }

        async function viewStudentProfile(id, name) {
            try {
                const profile = await apiFetch(`/analytics/student_profile/${id}`);
                const modal = document.getElementById("studentModal");
                document.getElementById("modalTitle").innerText = `${name}'s Profile`;
                
                // Set Stats
                const stats = profile.stats;
                document.getElementById("modalStats").innerHTML = `
                    <div class="stat-item"><div class="stat-value">${stats.quizzes_taken}</div><div>Taken</div></div>
                    <div class="stat-item"><div class="stat-value">${stats.avg_score.toFixed(1)}</div><div>Avg</div></div>
                    <div class="stat-item"><div class="stat-value">${stats.total_score}</div><div>Total</div></div>
                `;

                // Set History
                const history = profile.history;
                const modalBody = document.getElementById("modalHistoryBody");
                modalBody.innerHTML = history.map(h => `
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <td style="padding: 0.5rem; font-size:0.9rem;">${h.quiz_title}</td>
                        <td>${h.score}</td>
                        <td style="font-size:0.8rem; color:var(--text-muted);">${new Date(h.date).toLocaleDateString()}</td>
                    </tr>
                `).join("");

                modal.style.display = "flex";
            } catch (err) { alert(err.message); }
        }

        function closeModal() {
            document.getElementById("studentModal").style.display = "none";
        }
    </script>
</body>
</html>
