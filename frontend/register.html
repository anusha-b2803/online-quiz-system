<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Quizora</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/api.js"></script>
</head>
<body>
    <div class="glass-container" style="margin-top: 4rem;">
        <div style="margin-bottom: 1.5rem; text-align: left;">
            <a href="/" style="text-decoration: none; color: var(--primary); font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 0.25rem;">&larr; Back to Home</a>
        </div>
        <h2 style="text-align: center;">Create Account</h2>
        <p style="text-align: center; margin-bottom: 2rem;">Join the smart quiz platform</p>
        
        <form id="registerForm">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="John Doe" required>

            <label>Email Address</label>
            <input type="email" id="email" placeholder="email@example.com" required>
            
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" minlength="4" required>

            <label>I am a</label>
            <select id="role" required>
                <option value="STUDENT">Student</option>
                <option value="TEACHER">Teacher</option>
            </select>
            
            <button type="submit" id="submitBtn">Register</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem;">
            Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none;">Login</a>
        </p>
        <p id="errorMsg" style="color: #ef4444; font-size: 0.85rem; text-align: center; margin-top: 1rem;"></p>
    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const role = document.getElementById("role").value;
            const btn = document.getElementById("submitBtn");
            const errorMsg = document.getElementById("errorMsg");

            btn.innerText = "Registering...";
            errorMsg.innerText = "";

            try {
                const response = await fetch("/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, password, role })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || "Registration failed");
                }

                alert("Registration successful! Please login.");
                window.location.href = "login.html";
            } catch (err) {
                errorMsg.innerText = err.message;
                btn.innerText = "Register";
            }
        });
    </script>
</body>
</html>
